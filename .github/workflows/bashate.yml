---
# yamllint disable rule:line-length
name: bashate
'on':
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
permissions:
  contents: read
jobs:
  bashate:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: 3.14
      - run: pip install bashate==2.1.1
      - run: |
          readarray -t files < <(find . -name '*.sh')
          bashate -i E006,E003 "${files[@]}"
