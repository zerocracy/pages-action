---
# yamllint disable rule:line-length
name: css validation
'on':
  push:
  pull_request:
permissions:
  contents: read
jobs:
  validate-css:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 4.0.6
          bundler-cache: true
      - run: bundle config set --global path "$(pwd)/vendor/bundle"
      - run: sudo apt-get update --yes --fix-missing && sudo apt-get install --yes libxml2-utils
      - run: make install
      - run: make assets
      - name: Validate CSS
        run: |
          wget -O css-validator.jar \
            https://github.com/w3c/css-validator/releases/download/cssval-20250226/css-validator.jar
          sha256sum -c <<< '5f764d63be946cce3940deb154759bdc4413b898f766ae48f5f0e5c2212c8afd  css-validator.jar'
          java -jar css-validator.jar file:target/css/main.css
