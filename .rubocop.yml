---
AllCops:
  Exclude:
    - 'vendor/**/*'
  DisplayCopNames: true
  TargetRubyVersion: 3.2
  SuggestExtensions: false
  NewCops: enable
plugins:
  - rubocop-elegant
  - rubocop-minitest
  - rubocop-performance
  - rubocop-rake
Minitest/EmptyLineBeforeAssertionMethods:
  Enabled: false
Naming/FileName:
  Regex: '^[a-z\-._]*$'
Style/GlobalVars:
  Enabled: false
Metrics/MethodLength:
  Enabled: false
Lint/NestedMethodDefinition:
  Enabled: false
Gemspec/RequiredRubyVersion:
  Enabled: false
Style/ClassAndModuleChildren:
  Enabled: false
Layout/MultilineMethodCallIndentation:
  Enabled: false
Metrics/AbcSize:
  Enabled: false
Metrics/BlockLength:
  Enabled: false
Metrics/CyclomaticComplexity:
  Enabled: false
Metrics/ClassLength:
  Enabled: false
Metrics/PerceivedComplexity:
  Enabled: false
Layout/EmptyLineAfterGuardClause:
  Enabled: false
Layout/CaseIndentation:
  Enabled: false
Naming/MethodParameterName:
  MinNameLength: 2
Layout/MultilineAssignmentLayout:
  Enabled: true
# Judges are top-level procedural scripts, so defining methods at the top
# level is expected here.
Style/TopLevelMethodDefinition:
  Enabled: false
# The factbase API assigns dynamic properties through send(), which this cop
# forbids.
Style/Send:
  Enabled: false
# Factbase metric values are converted with to_f on purpose; the stricter
# Float() would raise on absent or non-numeric metrics.
Lint/NumberConversion:
  Enabled: false
# Tests re-raise rescued errors with a contextual string for debugging.
Style/ImplicitRuntimeError:
  Enabled: false
# Tests assign to named variables for readable assertions.
Elegant/NoRedundantVariable:
  Exclude:
    - 'test/**/*'
# Test methods are named as full sentences, not single nouns or verbs.
Elegant/GoodMethodName:
  Exclude:
    - 'test/**/*'
Elegant/IndentationLadder:
  Exclude:
    - 'test/**/*'
require: []
